<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Manrope', sans-serif; background: #fcfcfc; padding: 20px; }
  .row { display: flex; gap: 10px; }
  .pair { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .swatch { border-radius: 8px; height: 52px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 9px; }
  .light { height: 28px; border-radius: 6px; display: flex; align-items: center; padding: 0 8px; }
  span { font-size: 10px; font-weight: 600; }
  .sub { font-size: 9px; margin-top: 1px; }
  .label { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: #0f4c81; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="label">Semantic Colors</div>
<div class="row">
  <div class="pair">
    <div class="swatch" style="background:#1b873f"><span style="color:#fff">Success</span><span class="sub" style="color:rgba(255,255,255,0.7)">#1b873f</span></div>
    <div class="light" style="background:#e6f6ec"><span style="color:#1b873f">#e6f6ec</span></div>
  </div>
  <div class="pair">
    <div class="swatch" style="background:#d08700"><span style="color:#fff">Warning</span><span class="sub" style="color:rgba(255,255,255,0.7)">#d08700</span></div>
    <div class="light" style="background:#fff4d4"><span style="color:#d08700">#fff4d4</span></div>
  </div>
  <div class="pair">
    <div class="swatch" style="background:#cf222e"><span style="color:#fff">Error</span><span class="sub" style="color:rgba(255,255,255,0.7)">#cf222e</span></div>
    <div class="light" style="background:#ffebe9"><span style="color:#cf222e">#ffebe9</span></div>
  </div>
  <div class="pair">
    <div class="swatch" style="background:#0969da"><span style="color:#fff">Info</span><span class="sub" style="color:rgba(255,255,255,0.7)">#0969da</span></div>
    <div class="light" style="background:#ddf4ff"><span style="color:#0969da">#ddf4ff</span></div>
  </div>
</div>
</body>
</html>
