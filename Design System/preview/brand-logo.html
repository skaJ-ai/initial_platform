<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Manrope', sans-serif; background: #f5f5f7; padding: 28px 28px; }
  .label { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: #0f4c81; margin-bottom: 20px; }
  .row { display: flex; gap: 16px; align-items: stretch; }
  .card { border: 1px solid #e5e7eb; border-radius: 16px; padding: 24px 28px; background: #fff; flex: 1; display: flex; flex-direction: column; gap: 18px; }
  .card-dark { background: #0f4c81; border-color: #0a3d6b; }
  .card-scales { background: #fff; border-color: #e5e7eb; flex: 0 0 auto; width: 200px; justify-content: center; align-items: center; }

  .logo-lockup { display: flex; align-items: center; gap: 14px; }
  .icon { border-radius: 12px; background: #0f4c81; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(15,76,129,0.18); flex-shrink: 0; }
  .icon-dark { background: rgba(255,255,255,0.15); box-shadow: none; }
  .name { font-size: 20px; font-weight: 700; letter-spacing: 0; color: #0f4c81; line-height: 1.1; }
  .name-dark { color: #fff; }
  .sub { font-size: 10px; font-weight: 600; color: #4a6080; letter-spacing: 0.1em; margin-top: 2px; }
  .sub-dark { color: rgba(255,255,255,0.55); }
  .tagline { font-size: 12px; color: #4a6080; line-height: 1.6; border-top: 1px solid #f0f0f2; padding-top: 14px; }
  .tagline-dark { color: rgba(255,255,255,0.6); border-top-color: rgba(255,255,255,0.1); }

  .scales-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #8fa5be; margin-bottom: 16px; font-family: 'SFMono-Regular',Consolas,monospace; }
  .scale-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .scale-name { font-size: 10px; color: #8fa5be; width: 28px; flex-shrink: 0; font-family: 'SFMono-Regular',Consolas,monospace; }
</style>
</head>
<body>
<div class="label">Logo &amp; Brand Identity — HR AX Worktable</div>
<div class="row">

  <!-- Light -->
  <div class="card">
    <div class="logo-lockup">
      <div class="icon" style="width:48px;height:48px">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="9" height="9" rx="2" fill="white" opacity="0.9"/>
          <rect x="14" y="3" width="9" height="9" rx="2" fill="white" opacity="0.55"/>
          <rect x="3" y="14" width="9" height="9" rx="2" fill="white" opacity="0.55"/>
          <rect x="14" y="14" width="9" height="9" rx="2" fill="white" opacity="0.25"/>
        </svg>
      </div>
      <div>
        <div class="name">HR AX Worktable</div>
        <div class="sub">AI Native 작업공간</div>
      </div>
    </div>
    <div class="tagline">HR 담당자의 업무 카드와 프로세스 자산을 함께 운영하는 AI Native 작업공간</div>
  </div>

  <!-- Dark -->
  <div class="card card-dark">
    <div class="logo-lockup">
      <div class="icon icon-dark" style="width:48px;height:48px">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="9" height="9" rx="2" fill="white" opacity="0.9"/>
          <rect x="14" y="3" width="9" height="9" rx="2" fill="white" opacity="0.55"/>
          <rect x="3" y="14" width="9" height="9" rx="2" fill="white" opacity="0.55"/>
          <rect x="14" y="14" width="9" height="9" rx="2" fill="white" opacity="0.25"/>
        </svg>
      </div>
      <div>
        <div class="name name-dark">HR AX Worktable</div>
        <div class="sub sub-dark">AI Native 작업공간</div>
      </div>
    </div>
    <div class="tagline tagline-dark">발산에서 작성까지, 생각의 흐름을 남기는 AI Native 작업공간</div>
  </div>

  <!-- Size scale -->
  <div class="card card-scales" style="display:flex;flex-direction:column;align-items:flex-start;gap:0">
    <div class="scales-label">Size Scale</div>
    <div class="scale-row">
      <span class="scale-name">48</span>
      <div class="icon" style="width:48px;height:48px;border-radius:12px">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><rect x="3" y="3" width="9" height="9" rx="2" fill="white" opacity="0.9"/><rect x="14" y="3" width="9" height="9" rx="2" fill="white" opacity="0.55"/><rect x="3" y="14" width="9" height="9" rx="2" fill="white" opacity="0.55"/><rect x="14" y="14" width="9" height="9" rx="2" fill="white" opacity="0.25"/></svg>
      </div>
    </div>
    <div class="scale-row">
      <span class="scale-name">36</span>
      <div class="icon" style="width:36px;height:36px;border-radius:9px">
        <svg width="20" height="20" viewBox="0 0 26 26" fill="none"><rect x="3" y="3" width="9" height="9" rx="2" fill="white" opacity="0.9"/><rect x="14" y="3" width="9" height="9" rx="2" fill="white" opacity="0.55"/><rect x="3" y="14" width="9" height="9" rx="2" fill="white" opacity="0.55"/><rect x="14" y="14" width="9" height="9" rx="2" fill="white" opacity="0.25"/></svg>
      </div>
    </div>
    <div class="scale-row">
      <span class="scale-name">32</span>
      <div class="icon" style="width:32px;height:32px;border-radius:8px">
        <svg width="17" height="17" viewBox="0 0 26 26" fill="none"><rect x="3" y="3" width="9" height="9" rx="2" fill="white" opacity="0.9"/><rect x="14" y="3" width="9" height="9" rx="2" fill="white" opacity="0.55"/><rect x="3" y="14" width="9" height="9" rx="2" fill="white" opacity="0.55"/><rect x="14" y="14" width="9" height="9" rx="2" fill="white" opacity="0.25"/></svg>
      </div>
    </div>
    <div class="scale-row">
      <span class="scale-name">24</span>
      <div class="icon" style="width:24px;height:24px;border-radius:6px">
        <svg width="13" height="13" viewBox="0 0 26 26" fill="none"><rect x="3" y="3" width="9" height="9" rx="2" fill="white" opacity="0.9"/><rect x="14" y="3" width="9" height="9" rx="2" fill="white" opacity="0.55"/><rect x="3" y="14" width="9" height="9" rx="2" fill="white" opacity="0.55"/><rect x="14" y="14" width="9" height="9" rx="2" fill="white" opacity="0.25"/></svg>
      </div>
    </div>
  </div>

</div>
</body>
</html>
