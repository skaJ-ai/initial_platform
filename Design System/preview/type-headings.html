<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap');
  @font-face { font-family: 'Pretendard Variable'; src: url('../fonts/PretendardVariable.woff2') format('woff2-variations'); font-weight: 45 920; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Manrope', sans-serif; background: #fcfcfc; padding: 20px 24px; }
  .row { display: flex; flex-direction: column; gap: 6px; }
  .sample { display: flex; align-items: baseline; gap: 12px; }
  .tag { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #8fa5be; font-family: 'SFMono-Regular', Consolas, monospace; width: 52px; flex-shrink: 0; }
  .div { border-top: 1px solid #f0f0f2; margin: 4px 0; }
</style>
</head>
<body>
<div class="row">
  <div class="sample">
    <span class="tag">display</span>
    <span style="font-family:'Manrope';font-size:48px;font-weight:800;line-height:1;letter-spacing:0.01em;color:#0f4c81">생각이 흩어지지 않게</span>
  </div>
  <div class="div"></div>
  <div class="sample">
    <span class="tag">h1</span>
    <span style="font-family:'Manrope';font-size:32px;font-weight:700;letter-spacing:0.005em;color:#0d1f33">HR 담당자의 작업공간으로</span>
  </div>
  <div class="sample">
    <span class="tag">h2</span>
    <span style="font-family:'Manrope';font-size:24px;font-weight:700;letter-spacing:0.005em;color:#0d1f33">업무 카드와 프로세스 자산</span>
  </div>
  <div class="sample">
    <span class="tag">h3</span>
    <span style="font-family:'Manrope';font-size:18px;font-weight:700;letter-spacing:0.01em;color:#0d1f33">4모드 이야기 — 발산·검증·종합·작성</span>
  </div>
  <div class="sample">
    <span class="tag">h4</span>
    <span style="font-family:'Manrope';font-size:14px;font-weight:700;letter-spacing:0.01em;color:#0d1f33">이전 세션에서 이어진 작업 카드</span>
  </div>
</div>
</body>
</html>
