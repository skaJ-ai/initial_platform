<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Manrope', sans-serif; background: #f5f5f7; padding: 20px 24px; }
  .label { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: #0f4c81; margin-bottom: 12px; }
  .row { display: flex; gap: 12px; }
  .surface { flex: 1; border-radius: 16px; padding: 16px; height: 110px; display: flex; flex-direction: column; justify-content: flex-end; position: relative; overflow: hidden; }
  .stag { font-size: 10px; font-weight: 700; color: #8fa5be; }
  /* Hero panel */
  .hero::before { content: ''; position: absolute; top: -40px; right: -40px; width: 140px; height: 140px; border-radius: 9999px; background: radial-gradient(circle, rgba(224,250,246,0.9), transparent 64%); }
  /* CTA */
  .cta::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at top right, rgba(224,250,246,0.18), transparent 36%), radial-gradient(circle at bottom left, rgba(212,228,247,0.22), transparent 34%); }
  /* Empty state watermark */
  .empty::after { content: 'AX'; position: absolute; right: 12px; bottom: 4px; font-size: 56px; font-weight: 800; letter-spacing: -0.08em; color: rgba(15,76,129,0.08); line-height: 1; }
  /* Glass */
  .glass { background: rgba(255,255,255,0.92); border: 1px solid rgba(226,232,240,0.9); backdrop-filter: blur(12px); }
</style>
</head>
<body>
<div class="label">Surface Patterns &amp; Backgrounds</div>
<div class="row">
  <div class="surface hero" style="background:linear-gradient(180deg,rgba(255,255,255,0.92),rgba(245,245,247,0.98));border:1px solid #e5e7eb;box-shadow:0 16px 44px rgba(15,76,129,0.14)">
    <div class="stag">Hero Panel — radial teal glow top-right</div>
  </div>
  <div class="surface cta" style="background:#0f4c81">
    <div class="stag" style="color:rgba(255,255,255,0.5)">CTA Section — solid accent + radial overlays</div>
  </div>
  <div class="surface empty" style="background:radial-gradient(circle at top left,rgba(212,228,247,0.9),transparent 55%),#f5f5f7;border:1px solid #f0f0f2">
    <div class="stag">Empty State — radial accent + watermark mark</div>
  </div>
  <div class="surface glass">
    <div class="stag">Glass — rgba(255,255,255,0.92) + blur(12px)</div>
  </div>
</div>
</body>
</html>
