<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Manrope', sans-serif; background: #f5f5f7; padding: 20px 24px; }
  .label { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: #0f4c81; margin-bottom: 12px; }
  .row { display: flex; gap: 14px; margin-bottom: 16px; align-items: center; }
  .rbox { background: #0f4c81; display: flex; align-items: center; justify-content: center; width: 52px; height: 52px; }
  .rname { font-size: 10px; font-weight: 700; color: #4a6080; margin-top: 5px; text-align: center; }
  .rval { font-size: 9px; color: #8fa5be; text-align: center; }
  .rcol { display: flex; flex-direction: column; align-items: center; }
  .srow { display: flex; gap: 14px; align-items: center; }
  .shadow-box { background: #fff; width: 60px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .sname { font-size: 10px; font-weight: 700; color: #4a6080; margin-top: 5px; text-align: center; }
  .scol { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
<div class="label">Border Radius</div>
<div class="row">
  <div class="rcol">
    <div class="rbox" style="border-radius:8px"></div>
    <div class="rname">sm</div><div class="rval">8px</div>
  </div>
  <div class="rcol">
    <div class="rbox" style="border-radius:12px"></div>
    <div class="rname">md</div><div class="rval">12px</div>
  </div>
  <div class="rcol">
    <div class="rbox" style="border-radius:20px"></div>
    <div class="rname">lg</div><div class="rval">20px</div>
  </div>
  <div class="rcol">
    <div class="rbox" style="border-radius:9999px;width:80px;height:32px"></div>
    <div class="rname">full</div><div class="rval">9999px</div>
  </div>
  <div class="rcol">
    <div class="rbox" style="border-radius:14px"></div>
    <div class="rname">card</div><div class="rval">14px</div>
  </div>
  <div class="rcol">
    <div class="rbox" style="border-radius:28px;width:60px;height:60px"></div>
    <div class="rname">panel</div><div class="rval">28px</div>
  </div>
</div>
<div class="label">Shadows — Brand-tinted</div>
<div class="srow">
  <div class="scol">
    <div class="shadow-box" style="box-shadow:0 2px 6px rgba(15,76,129,0.06)"></div>
    <div class="sname">shadow-1</div><div class="rval">subtle</div>
  </div>
  <div class="scol">
    <div class="shadow-box" style="box-shadow:0 4px 14px rgba(15,76,129,0.09)"></div>
    <div class="sname">shadow-2</div><div class="rval">card hover</div>
  </div>
  <div class="scol">
    <div class="shadow-box" style="box-shadow:0 8px 28px rgba(15,76,129,0.12)"></div>
    <div class="sname">shadow-3</div><div class="rval">panel</div>
  </div>
  <div class="scol">
    <div class="shadow-box" style="box-shadow:0 16px 44px rgba(15,76,129,0.14)"></div>
    <div class="sname">shadow-4</div><div class="rval">hero</div>
  </div>
  <div class="scol">
    <div class="shadow-box" style="box-shadow:0 24px 64px rgba(15,76,129,0.16)"></div>
    <div class="sname">shadow-5</div><div class="rval">modal</div>
  </div>
</div>
</body>
</html>
