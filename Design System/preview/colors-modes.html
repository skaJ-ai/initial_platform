<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Manrope', sans-serif; background: #fcfcfc; padding: 20px; }
  .row { display: flex; gap: 10px; }
  .card { flex: 1; border-radius: 12px; padding: 14px; border: 1px solid transparent; }
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 600; margin-bottom: 8px; }
  .title { font-size: 12px; font-weight: 700; line-height: 1.3; }
  .sub { font-size: 10px; margin-top: 4px; line-height: 1.5; }
  .label { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: #0f4c81; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="label">4-Mode Color System</div>
<div class="row">
  <div class="card" style="background:rgba(224,250,246,0.6);border-color:rgba(0,191,165,0.2)">
    <div class="badge" style="background:#e0faf6;color:#00bfa5">발산</div>
    <div class="title" style="color:#0d1f33">발산은 가능성을 넓혀 재료를 확보합니다</div>
    <div class="sub" style="color:#4a6080">Diverge · #00bfa5</div>
  </div>
  <div class="card" style="background:rgba(255,244,212,0.6);border-color:rgba(208,135,0,0.2)">
    <div class="badge" style="background:#fff4d4;color:#d08700">검증</div>
    <div class="title" style="color:#0d1f33">검증은 놓치기 쉬운 반론과 리스크를 꺼냅니다</div>
    <div class="sub" style="color:#4a6080">Validate · #d08700</div>
  </div>
  <div class="card" style="background:rgba(221,244,255,0.6);border-color:rgba(9,105,218,0.2)">
    <div class="badge" style="background:#ddf4ff;color:#0969da">종합</div>
    <div class="title" style="color:#0d1f33">종합은 흩어진 근거를 의사결정 가능한 주장으로 압축합니다</div>
    <div class="sub" style="color:#4a6080">Synthesize · #0969da</div>
  </div>
  <div class="card" style="background:rgba(230,246,236,0.6);border-color:rgba(27,135,63,0.2)">
    <div class="badge" style="background:#e6f6ec;color:#1b873f">작성</div>
    <div class="title" style="color:#0d1f33">작성은 사고를 사람과 시스템이 함께 쓸 결과물로 바꿉니다</div>
    <div class="sub" style="color:#4a6080">Write · #1b873f</div>
  </div>
</div>
</body>
</html>
