<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap');
  @font-face { font-family: 'Pretendard Variable'; src: url('../fonts/PretendardVariable.woff2') format('woff2-variations'); font-weight: 45 920; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard Variable','Pretendard',sans-serif; background: #f5f5f7; padding: 20px 24px; display: flex; gap: 20px; }
  .sidebar { width: 220px; background: #fff; border: 1px solid #f0f0f2; border-radius: 14px; padding: 16px 12px; flex-shrink: 0; }
  .logo { display: flex; align-items: center; gap: 10px; padding: 0 8px; margin-bottom: 16px; }
  .logo-icon { width: 32px; height: 32px; background: #0f4c81; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 700; font-family: 'SFMono-Regular',monospace; flex-shrink: 0; }
  .logo-name { font-family: 'Manrope',sans-serif; font-size: 15px; font-weight: 700; color: #0f4c81; letter-spacing: 0; line-height: 1.1; }
  .logo-sub { font-size: 9px; font-weight: 600; color: #4a6080; letter-spacing: 0.08em; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; font-size: 14px; font-weight: 500; color: #4a6080; margin-bottom: 2px; cursor: pointer; }
  .nav-item.active { background: #d4e4f7; color: #0f4c81; font-weight: 600; }
  .nav-item:hover:not(.active) { background: #f5f5f7; color: #0d1f33; }
  .nav-code { width: 28px; border-radius: 9999px; background: #f5f5f7; padding: 2px 0; text-align: center; font-family: 'SFMono-Regular',monospace; font-size: 9px; font-weight: 700; color: #8fa5be; flex-shrink: 0; }
  .nav-code.active { background: rgba(15,76,129,0.1); color: #0f4c81; }
  .divider { height: 1px; background: #f0f0f2; margin: 10px 0; }
  .user-area { padding: 0 8px; }
  .user-name { font-size: 13px; font-weight: 700; color: #0d1f33; }
  .user-ws { font-size: 10px; color: #4a6080; }
  .preview-note { flex: 1; display: flex; align-items: center; justify-content: center; }
  .note { font-size: 12px; color: #8fa5be; font-style: italic; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">
    <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 26 26" fill="none"><rect x="3" y="3" width="9" height="9" rx="2" fill="white" opacity="0.9"/><rect x="14" y="3" width="9" height="9" rx="2" fill="white" opacity="0.55"/><rect x="3" y="14" width="9" height="9" rx="2" fill="white" opacity="0.55"/><rect x="14" y="14" width="9" height="9" rx="2" fill="white" opacity="0.25"/></svg></div>
    <div>
      <div class="logo-name">HR AX Worktable</div>
      <div class="logo-sub">AI Native 작업공간</div>
    </div>
  </div>
  <nav>
    <div class="nav-item active">
      <span class="nav-code active">WB</span>워크벤치
    </div>
    <div class="nav-item">
      <span class="nav-code">NW</span>새 작업
    </div>
    <div class="nav-item">
      <span class="nav-code">WC</span>업무 카드
    </div>
    <div class="nav-item">
      <span class="nav-code">RV</span>검토 큐
    </div>
    <div class="nav-item">
      <span class="nav-code">RP</span>리포트
    </div>
    <div class="nav-item">
      <span class="nav-code">KB</span>지식 라이브러리
    </div>
    <div class="nav-item">
      <span class="nav-code">WK</span>공유 위키
    </div>
    <div class="nav-item">
      <span class="nav-code">ST</span>설정
    </div>
  </nav>
  <div class="divider"></div>
  <div class="user-area">
    <div class="user-name">김민지</div>
    <div class="user-ws">HR 기획팀 워크스페이스</div>
  </div>
</div>
<div class="preview-note">
  <div class="note">sidebar-nav-item · sidebar-nav-item[data-active]<br>Fixed 16rem · bg-elevated · border-right subtle</div>
</div>
</body>
</html>
