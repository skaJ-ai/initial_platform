<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR AX Platform — MVP Demo</title>
<link rel="icon" href="../wiki/assets/wiki-icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="assets/style.css?v=1">
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="brand-block">
      <div class="brand">HR AX Platform</div>
      <div class="brand-sub">HR 데이터 안전 게이트</div>
    </div>
    <div class="breadcrumb" id="breadcrumb">MX사업부 People팀</div>
  </div>
  <div class="right">
    <div class="endpoint-status" id="endpoint-status-top">
      <span class="dot"></span>
      <span>LLM 미설정</span>
    </div>
    <button class="btn" id="settings-btn">설정</button>
    <div class="user-chip" id="user-chip">사용자</div>
  </div>
</header>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<div class="modal-backdrop" id="settings-modal">
  <div class="modal">
    <h2>LLM 엔드포인트 설정</h2>
    <p class="modal-help">
      OpenAI 호환 API 엔드포인트를 입력하세요. Ollama, LM Studio, vLLM, OpenAI 호환 서버를 사용할 수 있습니다.
    </p>

    <label for="cfg-endpoint">Endpoint URL</label>
    <input type="text" id="cfg-endpoint" placeholder="http://localhost:1234/v1/chat/completions">

    <label for="cfg-apikey">API Key (필요 시)</label>
    <input type="password" id="cfg-apikey" placeholder="sk-... 또는 비워두기">

    <label for="cfg-model">Model 이름</label>
    <input type="text" id="cfg-model" placeholder="예: gpt-4, llama3, gemma-2b">

    <p class="modal-note">
      엔드포인트가 미설정이면 sample 응답을 표시합니다.<br>
      Docker 백엔드(/api/llm/chat/completions)가 떠 있으면 그 프록시가 자동 사용됩니다.
    </p>

    <div class="modal-actions">
      <button class="btn" id="settings-cancel">취소</button>
      <button class="btn primary" id="settings-save">저장</button>
    </div>
  </div>
</div>

<script src="assets/scenarios.js?v=2"></script>
<script src="assets/llm-client.js?v=1"></script>
<script src="assets/app.js?v=2"></script>

</body>
</html>
