<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR AX Platform - MVP Demo</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-left">
    <div class="brand-mark" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="9" height="9" rx="2" fill="white" opacity="0.9"/>
        <rect x="14" y="3" width="9" height="9" rx="2" fill="white" opacity="0.55"/>
        <rect x="3" y="14" width="9" height="9" rx="2" fill="white" opacity="0.55"/>
        <rect x="14" y="14" width="9" height="9" rx="2" fill="white" opacity="0.25"/>
      </svg>
    </div>
    <div class="brand-block">
      <div class="brand">HR AX Platform</div>
      <div class="brand-sub">AI Native Work-space</div>
    </div>
    <div class="breadcrumb" id="breadcrumb">Work-space</div>
  </div>
  <div class="right">
    <div class="endpoint-status" id="endpoint-status-top">
      <span class="dot"></span>
      <span>LLM 미설정</span>
    </div>
    <button class="btn" id="settings-btn"><span class="btn-code">ST</span>설정</button>
    <div class="user-chip" id="user-chip">사용자</div>
  </div>
</header>

<!-- APP LAYOUT -->
<div class="app">
  <aside class="sidebar" id="sidebar"><!-- rendered by app.js --></aside>
  <main class="main" id="main"><!-- rendered by app.js --></main>
  <aside class="panel-right hidden" id="panel-right"><!-- rendered when card is open --></aside>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-backdrop" id="settings-modal">
  <div class="modal">
    <h2>LLM 엔드포인트 설정</h2>
    <p class="modal-help">
      OpenAI 호환 API 엔드포인트를 입력하세요. (Ollama, LM Studio, vLLM, OpenAI 등)
    </p>

    <label>Endpoint URL</label>
    <input type="text" id="cfg-endpoint" placeholder="http://localhost:1234/v1/chat/completions">

    <label>API Key (필요 시)</label>
    <input type="password" id="cfg-apikey" placeholder="sk-... 또는 비워두기">

    <label>Model 이름</label>
    <input type="text" id="cfg-model" placeholder="예: gpt-4, llama3, gemma-2b">

    <p class="modal-note">
      <strong>껍데기 모드</strong>: 현재는 sample 응답만 반환됩니다.<br>
      실제 LLM 호출은 <code>assets/llm-client.js</code>를 다음 LLM이 채워야 동작합니다.
    </p>

    <div class="modal-actions">
      <button class="btn" id="settings-cancel">취소</button>
      <button class="btn primary" id="settings-save">저장</button>
    </div>
  </div>
</div>

<!-- SCRIPTS -->
<script src="assets/scenarios.js"></script>
<script src="assets/llm-client.js"></script>
<script src="assets/app.js"></script>

</body>
</html>
